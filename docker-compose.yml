services:
  gws_mcp:
    build: .
    container_name: gws_mcp
    environment:
      - GOOGLE_MCP_CREDENTIALS_DIR=/app/store_creds
    volumes:
      - ./client_secret.json:/app/client_secret.json:ro
      - store_creds:/app/store_creds:rw
    env_file:
      - .env
    networks:
      - mcp_net

  nginx:
    image: nginx:alpine
    container_name: gws_mcp_proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gws_mcp
    networks:
      - mcp_net

volumes:
  store_creds:

networks:
  mcp_net: